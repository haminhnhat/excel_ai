<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Excel AI Controller</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; background: #f3f4f6; }
    body { margin: 0; padding: 32px; }
    .wrap { max-width: 980px; margin: 0 auto; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; box-shadow: 0 10px 24px rgba(15,23,42,.06); padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { color: #4b5563; line-height: 1.55; }
    textarea { width: 100%; min-height: 110px; resize: vertical; padding: 14px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 15px; box-sizing: border-box; }
    input, select { padding: 10px 12px; border-radius: 10px; border: 1px solid #d1d5db; }
    button { padding: 12px 18px; border: 0; border-radius: 12px; background: #111827; color: #fff; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin: 14px 0; }
    .result { margin-top: 22px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; white-space: pre-wrap; overflow-x: auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 16px; }
    .metric { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 14px; }
    .metric .k { font-size: 13px; color: #6b7280; }
    .metric .v { margin-top: 4px; font-size: 18px; font-weight: 750; }
    a { color: #0f766e; font-weight: 700; }
    .small { font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Excel AI Controller</h1>
      <p>Nhập câu lệnh để tạo scenario cho financial model Excel. Hệ thống sẽ parse command, sửa input cell trong mapping, recalculate workbook và trả kết quả.</p>

      <label><strong>Câu lệnh</strong></label>
      <textarea id="command">Tăng tổng mức đầu tư từ 1000 tỷ lên 1200 tỷ. Trả ra lợi nhuận sau thuế, NPV dự án, IRR dự án, NPV chủ đầu tư, IRR chủ đầu tư.</textarea>

      <div class="row">
        <label>Excel file:</label>
        <input id="file" type="file" accept=".xlsx,.xlsm" />
        <label>Engine:</label>
        <select id="engine">
          <option value="auto">auto</option>
          <option value="xlwings">xlwings</option>
          <option value="openpyxl">openpyxl</option>
        </select>
        <button id="runBtn" onclick="runScenario()">Run scenario</button>
      </div>
      <div class="small">Nếu không upload file, backend sẽ dùng MODEL_PATH trong file .env.</div>

      <div id="metrics" class="grid"></div>
      <div id="download"></div>
      <pre id="result" class="result">Ready.</pre>
    </div>
  </div>

<script>
async function runScenario() {
  const btn = document.getElementById('runBtn');
  const result = document.getElementById('result');
  const metrics = document.getElementById('metrics');
  const download = document.getElementById('download');
  btn.disabled = true;
  result.textContent = 'Running...';
  metrics.innerHTML = '';
  download.innerHTML = '';

  const fd = new FormData();
  fd.append('command', document.getElementById('command').value);
  fd.append('engine', document.getElementById('engine').value);
  const file = document.getElementById('file').files[0];
  if (file) fd.append('file', file);

  try {
    const res = await fetch('/api/scenario', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Request failed');

    const outputs = data.formatted_outputs || {};
    metrics.innerHTML = Object.entries(outputs).map(([k, v]) => `
      <div class="metric"><div class="k">${k}</div><div class="v">${v}</div></div>
    `).join('');

    if (data.download_url) {
      download.innerHTML = `<p><a href="${data.download_url}">Download scenario Excel file</a></p>`;
    }
    result.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    result.textContent = String(err);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
