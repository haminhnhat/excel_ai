metadata:
  name: Project A sample financial model
  version: '0.1'
  currency: VND
  note: Synthetic sample profile for onboarding tests.
settings:
  allow_formula_overwrite: false
  default_outputs:
  - profit_after_tax
  - project_npv
  - project_irr
  - equity_npv
  - equity_irr
  - total_investment
inputs:
  loan_interest_rate:
    sheet: Assumptions
    cell: C8
    type: percent
    editable: true
    min: 0.0
    max: 0.25
    unit: decimal
    description: Loan interest rate. 0.08 = 8% per annum.
    aliases:
    - lãi vay
    - lai vay
    - lãi suất
    - lãi ngân hàng
    - interest rate
    - chi phí vốn vay
  vat_rate:
    sheet: Assumptions
    cell: C10
    type: percent
    editable: true
    min: 0.0
    max: 0.2
    unit: decimal
    description: VAT rate.
    aliases:
    - vat
    - thuế vat
    - thue vat
  cit_rate:
    sheet: Assumptions
    cell: C11
    type: percent
    editable: true
    min: 0.0
    max: 0.35
    unit: decimal
    description: Corporate income tax rate.
    aliases:
    - tndn
    - thuế tndn
    - cit
    - corporate income tax
  selling_price_change:
    sheet: Assumptions
    cell: C12
    type: percent
    editable: true
    min: -0.5
    max: 1.0
    unit: decimal
    description: Selling price scenario adjustment.
    aliases:
    - giá bán
    - gia ban
    - đơn giá
    - selling price
    - doanh thu
    - revenue
  investment_cost_change:
    sheet: Assumptions
    cell: C13
    type: percent
    editable: true
    min: -0.3
    max: 1.0
    unit: decimal
    description: Investment cost scenario adjustment.
    aliases:
    - tổng mức đầu tư
    - tong muc dau tu
    - tmđt
    - tmdt
    - chi phí đầu tư
    - investment cost
    - capex
  sales_volume_change:
    sheet: Assumptions
    cell: C14
    type: percent
    editable: true
    min: -0.5
    max: 1.0
    unit: decimal
    description: Sales volume scenario adjustment.
    aliases:
    - sản lượng bán
    - so can
    - số căn
    - sales volume
    - units sold
  admin_cost_rate:
    sheet: Assumptions
    cell: C15
    type: percent
    editable: true
    min: 0.0
    max: 0.2
    unit: decimal
    description: Admin cost as % of revenue.
    aliases:
    - chi phí quản lý
    - admin cost
    - g&a
  marketing_rate:
    sheet: Assumptions
    cell: C16
    type: percent
    editable: true
    min: 0.0
    max: 0.2
    unit: decimal
    description: Marketing cost as % of revenue.
    aliases:
    - marketing
    - chi phí marketing
    - truyền thông
  debt_financing_ratio:
    sheet: Assumptions
    cell: C17
    type: percent
    editable: true
    min: 0.0
    max: 0.9
    unit: decimal
    description: Debt financing ratio.
    aliases:
    - tỷ lệ vay
    - debt ratio
    - vốn vay
outputs:
  project_npv:
    sheet: Summary
    cell: B6
    type: currency
    description: Project NPV.
  project_irr:
    sheet: Summary
    cell: B7
    type: percent
    description: Project IRR approximation.
  equity_npv:
    sheet: Summary
    cell: B8
    type: currency
    description: Equity NPV.
  equity_irr:
    sheet: Summary
    cell: B9
    type: percent
    description: Equity IRR approximation.
  profit_after_tax:
    sheet: Summary
    cell: B10
    type: currency
    description: Total profit after tax.
  total_investment:
    sheet: Summary
    cell: B11
    type: currency
    description: Adjusted total investment.
  bank_loan:
    sheet: Summary
    cell: B12
    type: currency
    description: Total debt draw.
  total_revenue:
    sheet: Summary
    cell: B13
    type: currency
    description: Total revenue before VAT.
